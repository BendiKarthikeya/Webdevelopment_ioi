<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .Jaipur{
            display: grid;
            grid-template-columns: 8fr 4fr;
            margin-top: 20px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="shade">
        <header>
            <div class="d-flex justify-content-center" style="background-color:blue; gap: 700px;">
                <div>
                    <span> <img src="/IMAGE/JourneyPlanner.png" width="90px" height="70px" alt=""></span>
                    <span class="fs-2 text-light">JourneyPlanner</span>
                </div>
                <div>
                    <button class="btn btn-warning m-3">IN</span>
                    <button class="btn btn-warning m-3">Sign in</span>
                </div>
            </div>
            <nav class="d-flex justify-content-center bg-primary gap-3 p-2" >
                <button class="btn btn-primary p-3" style="border-radius: 50px; border: 1px solid white;"><span class="bi bi-buildings me-2"></span>Stays</button>
                <button class="btn btn-primary p-3" style="border-radius: 50px; border: 1px solid white;"></span><span class="bi bi-airplane-fill me-2"></span>Flights</button>
                <button class="btn btn-primary p-3" style="border-radius: 50px; border: 1px solid white;"><span class="bi bi-buildings me-2"></span><span class="bi bi-airplane-fill me-2"></span>Flight + Hotel</button>
                <button class="btn btn-primary p-3" style="border-radius: 50px; border: 1px solid white;"><span class="bi bi-car-front me-2"></span>Car retals</button>
                <button class="btn btn-primary p-3" style="border-radius: 50px; border: 1px solid white;"><span class="bi bi-flower1 me-2"></span>Attractions</button> 
                <button class="btn btn-primary p-3" style="border-radius: 50px; border: 1px solid white;"><span class="bi bi-taxi-front me-2"></span>Airport taxis</button>
            </nav>    
        </header>

        <section class="Jaipur">
            <div class="ms-5">
                <p class="fs-4 fw-bold">Home < Holiday</p>
                <h2 class="mb-4">Jaipur</h2>
                <div class="d-flex gap-3 ">
                    <div><img src="/IMAGE/Rajasthan1.jpg" width="200px" height="300px" style="border-radius: 20px; border: 2px solid black;" ></div>
                    <div><img src="/IMAGE/Rajasthan2.jpg" width="200px" height="300px" style="border-radius: 20px; border: 2px solid black;" ></div>
                    <div><img src="/IMAGE/Rajasthan3.jpg" width="200px" height="300px" style="border-radius: 20px; border: 2px solid black;" ></div>
                </div>
            </div>
            <div class="text-center mt-5">
                <p>
                    <b>Starting form</b><br>
                    <span class="bi bi-currency-rupee">15990</span><br>
                    <span class="bi bi-currency-rupee"><b>3990</b> Per Person</span>
                </p>
            
                <button class="btn btn-light border-black text-primary w-75 fw-bold">SUBMIT YOUR QUERY</button>
                <div class="d-flex justify-content-center">
                    <div class="card mt-2 w-75">
                        <div class="card-header">
                            <p><b>Durtion:</b> 5 Nights & 6 Days </p>
                            <input type="text" class="form-control bi bi-search ps-2" placeholder="search..." style="border: 1px solid black; border-radius: 20px;">
                           
                        </div>
                        <div class="card-body d-flex justify-content-center gap-3">
                            <span class="bi bi-airplane"><br>Flight</span>
                            <span class="bi bi-buildings"><br>Hotels</span>
                            <span class="bi bi-binoculars"><br>Sights</span>
                            <span class="bi bi-car-front"><br>Tranfer</span>
                            <span class="bi bi-backpack3"><br>luggage</span>
                        </div>
                    </div>  
                </div>
                

            </div>
            


        </section>



        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>    

    </div>
    </body>
</html>
