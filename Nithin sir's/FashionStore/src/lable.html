<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/FashionStore/src/node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/FashionStore/node_modules/bootstrap/dist/css/bootstrap.css">
    <style>
        .container{
            padding: 10px;
            border: 1px solid black;
            margin: 10px;
            width: 250px;

        }
        .error-field{
            color: red;
            font-size: 14px;
        }
        h3{
            font-weight: bold;
        }
        .form-group{
            margin-bottom: 10px;
        }
        label{
            font-weight: bold;
        }
    </style>
</head>
<body>
    <form class="container">
        <h3><span class="bi bi-person">User Login</span></h3>

        <div class="form-group">
            <label for="txtUser">Username</label>
            <div>
                <input type="text" name="txtUser">
                <div class="error-field">
                    <span>Username is required</span>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label for="txtPwd">Password</label>
            <div>
                <input type="text" name="txtPwd">
                <div class="error-field">
                    <span>Password is required</span>
                </div>
            </div>
        </div>
        <button>Submit</button>
    </form>
</body>
</html>
