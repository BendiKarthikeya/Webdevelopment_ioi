<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/FashionStore/node_modules/bootstrap/dist/css/bootstrap.css">
    <link rel="stylesheet" href="/FashionStore/src/node_modules/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
    <div class="m-3">
        <div class="h3">Amazon Search Bar</div>
        <div class="input-group w-50">
            <select class="input-group-text">
                <option>All</option>
                <option>Electronics</option>
                <option>Furinture</option>
                <option>Fashion</option>
            </select>
            <input type="text" placeholder="Search Amazon.in" class="form-control">
            <button class="bi bi-search btn btn-warning"></button>
        </div>
    </div>

    <div class="m-3">
        <div class="h3">Password</div>
        <div class="input-group w-50">
            <span class="bi bi-key-fill input-group-text"></span>
            <input type="password" class="form-control">
            <button class="bi bi-check-square btn btn-success"></button>
        </div>
    </div>
    <div class="m-3">
        <div class="h4">Price</div>
        <div class="input-group w-50">
            <span class=" input-group-text bg-black text-white">&#8377;</span>
            <input type="number" class="form-control">
            <button class="btn btn-dark text-white">0.0</button>
        </div>
    </div>
</body>
</html>
