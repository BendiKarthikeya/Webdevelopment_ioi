<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body{
            background-size: cover;
            background-repeat: no-repeat;
        }
        .shade{
            background-color: rgb(0, 0, 0,0.6) ;
            height: 100vh;
            width: 100vw;
            margin:-8px
        }
        header{
            color: white;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            padding: 10px;
        }
        .netflix_title{
           font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: red;
            margin-left: 50px;
            font-size: 35px;
            font-weight: bold;
        }
        .signIn{
            padding: 10px;
            background-color: red;
            border-radius: 5px;
        }
        .other_part_header{
            margin-top:10px ;
            font-size: medium;

        }
        
        main{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            color: white;
            text-align: center;
        }
        .textbox{
            display: inline block;
            width: 300px;
            background-color: rgb(55, 54, 54);
            padding: 10px;
            margin-right: 10px;
            text-align: left;
        }
        .part4{
            display:flex;
            margin-left: 80px;
        }
        .buttontype{
            background-color: red;
            color: white;
            font-size: medium;
            padding: 10px;
        }
    </style>
</head>
<body background="/public/images/netflix_banner.jpg">
    <div class="shade">
        <header>
            <div class="netflix_title">NETFLIX</div>
            <div class="other_part_header">
                <span class="bi bi-globe"></span>
                <span> Language </span>
                <span class="bi bi-chevron-down"></span>
                <span class="signIn">SignIn</span>
            </div>
        </header>
            <main>
                <div class="content">
                    <div> <h1>Unlimited movies,TV shows and more</h1> </div>
                    <div><h2>Watch anywhere. Cancel anytime.</h2></div>
                    <div><h3>Ready to watch? Enter your email to create or restart your membership.</h3></div>
                    <div class="part4"><div class="textbox">Email address</div> <div class="buttontype"><span>Get Started</span><span class="bi bi-chevron-right"></span></div></div>
                </div>
            </main> 

        
    </div>
</body>
</html>
