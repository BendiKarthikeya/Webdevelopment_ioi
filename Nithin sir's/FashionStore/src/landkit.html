<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        header{
            display: flex;
            justify-content: space-evenly;
        }
        .Website_name{
            color:rgb(62, 62, 247);
            font-weight: bold;
            font-size: 25px;
            margin-top: 15px;
        }
        .part2{
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            margin-top: 15px;
            margin-left: 10px;
            color: rgb(107, 107, 108);
            
        }
        .part2_1{
            margin-right: 40px ;
            font-size: 18px;

        }
        button{
            background-color: #335eea;
            color: white;
            border-radius: 5px;
            font-size: 15px;
            border: 0;

        }
        .Buy_now{
            padding: 15px;

        }
        .part3{
            margin-bottom: 5px;
        }
        .document{
            background-color:  #eaeffd;
            color: #335EEA;
            padding:15px;
            font-size: 20px;
            
        }
        .Landkit{
            color: #335eea;
        }
        .part3_1{
            font-weight: lighter;
            font-size: 50px;
            margin-bottom: 40px;
            
        }
        .part3_2{
            color: #869CC6;
            font-size: 20px;
            font-weight: lighter;
            margin-bottom: 50px;
            line-height: 30px;
        }
        section{
            margin-top: 200px;
            margin-left: 100px;
            font-family: Arial, sans-serif;
            font-weight:10;
           
        }
        .pages{
            padding:15px;
            font-size: 20px;
        }
        img{
            margin-top: -50px;
        }
        main{
            margin-left: 50px;
        }
    </style>
</head>
<body>
    <header>
        <div class="Website_name">Landkit.</div>
        <div class="part2">
            <div class="part2_1">Landings</div>
            <div class="part2_1">Pages</div>
            <div class="part2_1">Accounts</div>
            <div class="part2_1">Documentation</div>
        </div>
        <div class="part3">
            <button class="Buy_now">Buy now</button>
        </div>
    </header>
    <section>
        <main>
            <img src="/FashionStore/public/images/landkit_section.png" alt="not-display" width="600" height="400" title="landkit_section" align="right">
            <div>
                <div class="part3_1">
                    <div>Welcome to <span class="Landkit">Landkit.</span></div>
                    <div>Develop anything.</div>
                </div>
                <div class="part3_2">Build a beautiful, modern website with flexible
                    <br> Bootstrap components built from scratch.</div>
                <div class="part3_3"><button class="pages">View all Pages <span class="bi bi-arrow-right"></span></button>
                    <button class="document">Documentation</button></div>
            </div>
        </main>
    </section>
</body>
</html>
